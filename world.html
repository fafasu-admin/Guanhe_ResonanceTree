<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>世界复原图 | 游戏创造者议会</title>
    <meta name="description" content="四大协会共鸣值数据可视化。">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-page="world">
    <div class="ambient" aria-hidden="true">
      <span class="star star-a"></span>
      <span class="star star-b"></span>
      <span class="star star-c"></span>
      <span class="mist mist-a"></span>
      <span class="mist mist-b"></span>
    </div>

    <main class="shell world-shell">
      <header class="world-header">
        <div>
          <p class="eyebrow">游戏创造者议会 · 共鸣之章</p>
          <h1>世界复原图</h1>
          <p class="lead">各协会的发帖、评论、点赞与收藏汇聚为共鸣值。<br>越明亮的版图，代表越多创造者与支持者<br>正在使世界重新成形。</p>
        </div>
        <a class="ghost-link" href="index.html">返回共鸣者档案</a>
      </header>

      <section class="world-grid" aria-label="四协会世界复原图">
        <div class="map-board" id="map-board"></div>
        <aside class="world-stats">
          <p class="eyebrow">最近更新</p>
          <p class="update-text" id="updated-at">读取共鸣数据中</p>
          <div class="formula-box">
            <strong>共鸣值公式</strong>
            <span>有效发帖 x10 + 有效评论 x3 + 点赞 x1 + 收藏 x2</span>
          </div>
          <div class="resonance-bars" id="resonance-bars"></div>
        </aside>
      </section>

      <section class="leaderboards">
        <article class="board-card">
          <div class="section-heading">
            <p class="eyebrow">共鸣榜</p>
            <h2>最受欢迎的议题</h2>
          </div>
          <ol class="rank-list" id="topic-rank"></ol>
        </article>
        <article class="board-card">
          <div class="section-heading">
            <p class="eyebrow">荣誉墙</p>
            <h2>最有贡献的共鸣者</h2>
          </div>
          <ol class="rank-list" id="contributor-rank"></ol>
        </article>
      </section>
    </main>

    <script type="module" src="src/world.js"></script>
  </body>
</html>
